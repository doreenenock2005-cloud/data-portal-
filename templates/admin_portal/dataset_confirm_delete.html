{% extends 'admin_portal/base_admin.html' %}
{% block admin_content %}
<div class="row mb-3">
    <div class="col-md-6">
        <a href="{% url 'admin_portal:admin_datasets' %}" class="btn btn-secondary"><i class="fas fa-arrow-left me-1"></i> Back to Datasets</a>
    </div>
</div>
<div class="card border-0 shadow-sm">
    <div class="card-body text-center py-5">
        <i class="fas fa-exclamation-triangle text-warning mb-3" style="font-size:48px;"></i>
        <h4 class="fw-bold">Delete Dataset</h4>
        <p class="text-muted">Are you sure you want to delete <strong>{{ dataset.title }}</strong>? This action cannot be undone.</p>
        <form method="post" class="d-inline">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger"><i class="fas fa-trash me-1"></i> Yes, Delete</button>
        </form>
        <a href="{% url 'admin_portal:admin_datasets' %}" class="btn btn-secondary ms-2">Cancel</a>
    </div>
</div>
{% endblock %}
